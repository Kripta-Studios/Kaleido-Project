experiment_name: warehouse_event_jepa_smoke_v2
hypothesis: action-free future-latent pretraining improves remaining-time prediction over supervised sequence baselines
dataset_manifest: data/manifests/warehouse_outbound_2025.yaml
schema_version: warehouse_xes_csv_v1
split_manifest: outputs/warehouse_smoke_v2/split_manifest.json
seed: 42
prediction_points: [0.25, 0.5, 0.75]
horizons: [next_event, two_events, completion]
input_roles: [observation]
action_fields: []
context_fields: []
observation_fields: [concept:name, time:timestamp]
outcome_fields: [case_completion_time]
forbidden_fields: [future_events_at_inference, case_end_time_at_inference, final_event_count]
model: event_jepa_sigreg
baselines: [quantile_gradient_boosting, gru, process_transformer]
metrics: [mae, median_ae, pinball_p50, pinball_p90, p90_coverage, effective_rank]
threshold_selection: not_applicable
calibration: quantile_heads
compute:
  device: cpu
  seeds: [11, 42, 73]
  max_sequence_length: 16
  # CPU profile before training: 64x2/64 slices at batch 1024 took 1.99 s per
  # step; this 32x1/32-slice budget took 0.25 s at batch 512. Seeds, cases,
  # horizons and epochs remain unchanged.
  batch_size: 512
  pretrain_epochs: 3
  frozen_head_epochs: 12
  finetune_epochs: 2
  hidden_size: 32
  latent_size: 32
  layers: 1
  attention_heads: 4
  sigreg_slices: 32
  sigreg_weight: 0.1
claim_state: smoke_only
