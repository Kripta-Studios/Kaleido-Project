experiment_name: warehouse_var_event_jepa_smoke_v1
hypothesis: a variational temporal JEPA improves uncertainty and remaining-time prediction over deterministic JEPA embeddings
dataset_manifest: data/manifests/warehouse_outbound_2025.yaml
schema_version: warehouse_xes_csv_v1
split_manifest: outputs/warehouse_smoke_v2/split_manifest.json
seed: 42
prediction_points: [0.25, 0.5, 0.75]
horizons: [next_event, two_events, completion_suffix]
input_roles: [observation]
action_fields: []
context_fields: []
observation_fields: [concept:name, time:timestamp]
outcome_fields: [case_completion_time]
forbidden_fields: [future_events_at_inference, case_end_time_at_inference, final_event_count]
model: var_event_jepa_temporal_elbo
baselines: [raw_quantile_boosting, temporal_t_jepa, current_event_jepa]
metrics: [mae, median_ae, pinball_p50, pinball_p90, p90_coverage, interval_width]
threshold_selection: not_applicable
calibration: direct_quantile_probe_with_latent_uncertainty
compute:
  device: cpu
  seeds: [11, 42, 73]
  max_sequence_length: 16
  batch_size: 512
  pretrain_epochs: 4
  frozen_head_epochs: 12
  hidden_size: 32
  latent_size: 32
  auxiliary_size: 16
  layers: 1
  attention_heads: 4
  dropout: 0.0
  reconstruction_weight: 0.1
  generation_weight: 0.5
  context_kl_weight: 0.001
  auxiliary_kl_weight: 0.001
  target_kl_weight: 0.001
  kl_anneal_epochs: 3
  learning_rate: 0.001
  weight_decay: 0.0001
claim_state: smoke_only
