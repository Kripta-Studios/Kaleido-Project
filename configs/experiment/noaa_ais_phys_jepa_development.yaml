experiment_name: noaa_ais_port_call_phys_jepa_development_v1
hypothesis: >-
  A physics-informed JEPA that models the residual between kinematic approach
  and observed vessel evolution improves multi-horizon distance forecasting or
  two-hour deviation AUPRC over a tabular trajectory GBT on validation, while
  maintaining non-collapsed representations across seeds.
dataset_manifest: data/manifests/noaa_ais_2025_jan_feb.yaml
schema_version: marinecadastre-ais-prefix-v1
split_manifest: fixed_chronological_future_grouped_by_arrival_trip
seed: 42
seeds: [11, 42, 73]
prediction_points: sequence_cutoffs_with_targets_near_0.5_1_2_hours
horizons: [0.5h, 1h, 2h]
input_roles: [observation, context]
action_fields: []
context_fields: [port, vessel_group, dimensions]
observation_fields:
  - distance_to_port
  - speed_over_ground
  - course_error
  - historical_approach_speed
outcome_fields: [future_state, physical_progress_shortfall]
forbidden_fields: [arrival_time, future_state_in_context, mmsi]
model: ais_phys_jepa_visreg
baselines: [persistence, kinematic, trajectory_boosting, gru, transformer, plain_jepa]
metrics:
  - distance_mae_km
  - distance_mae_by_horizon_km
  - speed_mae_knots
  - deviation_auprc
  - latent_transition_alignment
  - effective_rank
threshold_selection: validation_only
calibration: pending_clean_test
data:
  horizons_hours: [0.5, 1.0, 2.0]
  max_sequence_length: 8
  min_context_events: 4
  target_tolerance_hours: 0.26
deviation_definition:
  horizon_hours: 2.0
  shortfall_km: 10.0
  semantics: actual_distance_exceeds_constant_course_physics_forecast_by_more_than_10km
label_efficiency:
  labeled_route_fraction: 0.10
  route_selection: sha256_ranked_within_seed
  delay_vs_direct_eta_hours: 2.0
  pretraining_outcomes_excluded: [remaining_hours, arrival_time, delay_label]
compute:
  device: cpu
  batch_size: 128
  pretrain_epochs: 40
  supervised_epochs: 30
  hidden_size: 128
  latent_size: 64
  layers: 2
  attention_heads: 4
  dropout: 0.0
  learning_rate: 0.001
  weight_decay: 0.0001
  ema_momentum: 0.996
  regularizer_slices: 32
  regularizer_weight: 0.01
  forecast_weight: 10.0
  sparse_heads:
    state_pca_components: 8
    eta:
      family: extra_trees
      n_estimators: 250
      min_samples_leaf: 3
      max_features: 0.7
    delay:
      family: hist_gradient_boosting
      learning_rate: 0.05
      max_iter: 200
      max_leaf_nodes: 15
      l2_regularization: 5.0
    ridge_alpha: 10.0
    logistic_c: 0.1
  jepa_variants:
    - plain_visreg
    - phys_none
    - phys_sigreg
    - phys_vicreg
    - phys_visreg
  boosting_max_iter: 200
  boosting_candidates:
    - {max_leaf_nodes: 15, l2_regularization: 5.0}
    - {max_leaf_nodes: 31, l2_regularization: 10.0}
acceptance_gates:
  require_selected_on_validation: true
  min_relative_distance_mae_improvement_vs_boosting_percent: 1.0
  min_sparse_eta_improvement_percent: 1.0
  require_sparse_delay_auprc_improvement: true
  require_noncollapsed_each_seed: true
test_influenced_choice: true
test_influence_reason: >-
  February 1-7 was previously opened by the AIS ETA benchmark. This run is
  development-only; a new future calendar interval is required for evidence.
claim_state: diagnostic
sources:
  phys_jepa: https://arxiv.org/abs/2606.16076
  leworldmodel: https://arxiv.org/abs/2603.19312
  visreg: https://arxiv.org/abs/2606.02572
development_selection:
  regularizer_metric: full_trajectory_validation_hybrid_mae_mean_km
  selected_regularizer: phys_vicreg
  sparse_feature_and_head_sweep_used_test: false
  sparse_feature_and_head_selection:
    eta: raw_plus_jepa_forecast_distance_and_speed_with_extra_trees
    delay: raw_plus_train_pca8_state_plus_jepa_forecast_distance_with_hgb15
